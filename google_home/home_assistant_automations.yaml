# ─────────────────────────────────────────────────────────────────────────────
# Google Home – Hourly Time Announcements via Home Assistant
# Drop this file into your /config/automations/ directory, or paste the
# individual entries into your automations.yaml.
#
# Prerequisites:
#   • Home Assistant with the Google Cast integration configured
#   • Replace "media_player.living_room_speaker" with your actual entity ID
#     (find it under Settings → Devices & Services → Google Cast)
# ─────────────────────────────────────────────────────────────────────────────

- id: time_announce_0600
  alias: "Time Announcement – 6 AM"
  trigger:
    - platform: time
      at: "06:00:00"
  action:
    - service: tts.google_translate_say
      target:
        entity_id: media_player.living_room_speaker
      data:
        message: "Good morning! It is now 6 AM."
        language: en

